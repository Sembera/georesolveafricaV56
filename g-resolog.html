<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Resolog - Borehole & Test Pit Logging Software | Georesolve Africa</title>
    <meta name="description"
        content="Professional client-side borehole and test-pit logging application. BS 5930 / ISO 14688-14689 / AS 1726 compliant. Vector PDF exports, Excel workbooks, SVG strip logs.">
    <meta name="keywords"
        content="borehole logging, geotechnical logging, core logging, test pit logging, BS 5930, ISO 14688, G-Resolog, Georesolve">

    <meta property="og:title" content="G-Resolog | Borehole & Test Pit Logging Software">
    <meta property="og:description"
        content="Professional client-side borehole and test-pit logging with BS 5930 / ISO 14688 compliant description builder and vector PDF exports.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://georesolveafrica.com/g-resolog.html">
    <link rel="canonical" href="https://georesolveafrica.com/g-resolog.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="footer-styles.css">

    <!-- Export libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/svg2pdf.js@2.2.3/dist/svg2pdf.umd.min.js"></script>

    <style>
        body {
            padding-top: 100px;
            padding-bottom: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #app-root {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .app-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            font-family: 'Inter', sans-serif;
            color: #345363;
            font-size: 18px;
            gap: 12px;
        }

        .app-loading .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #ddd;
            border-top-color: #4DA34D;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            body {
                padding-top: 70px;
            }
        }
    </style>
</head>

<body>
    <div id="app-root">
        <div class="app-loading" id="app-loading">
            <div class="spinner"></div>
            <span>Loading G-Resolog...</span>
        </div>
    </div>

    <!-- Header injected by js/header-component.js -->
    <!-- Footer & Clients injected by footer-component.js -->

    <script src="js/lead-capture.js"></script>
    <script type="module">
        import { UI } from './js/resolog/ui.js?v=20260707-9';

        // Remove loading state
        const loadingEl = document.getElementById('app-loading');
        if (loadingEl) loadingEl.remove();

        // Initialize the application
        UI.init().catch(err => {
            console.error('G-Resolog initialization failed:', err);
            const root = document.getElementById('app-root');
            if (root) {
                root.innerHTML = `<div style="padding:40px;text-align:center;color:#d9534f;">
                    <h2>Failed to load G-Resolog</h2>
                    <p>${err.message || 'Unknown error'}</p>
                    <p>Please check your browser supports IndexedDB and ES modules, then refresh.</p>
                </div>`;
            }
        });

        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {
                // Silently fail - offline support is non-critical
            });
        }
    </script>

    <!-- Local Components -->
    <script src="js/header-component.js" defer></script>
    <script src="footer-component.js" defer></script>
</body>

</html>
